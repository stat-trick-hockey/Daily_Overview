name: NHL Daily Dashboard

on:
  schedule:
    # Runs at 09:30 UTC daily (≈ 5:30 AM ET)
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override run date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      game_type:
        description: "Game type: 2=regular season, 3=playoffs"
        required: false
        default: "2"
      card:
        description: "Instagram card(s): all | combined | matchups | results | leaders | form"
        required: false
        default: "all"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Fetch & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests pandas pillow

      - name: Determine run date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "run_date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NHL Daily Dashboard (HTML)
        run: |
          python nhl_daily_dashboard.py \
            --date      "${{ steps.date.outputs.run_date }}" \
            --game_type "${{ github.event.inputs.game_type || '2' }}"

      - name: Generate Instagram PNG cards
        run: |
          python nhl_instagram_card.py \
            --date   "${{ steps.date.outputs.run_date }}" \
            --card   "${{ github.event.inputs.card || 'all' }}" \
            --outdir docs/instagram

      - name: Rebuild archive index page
        run: python scripts/build_archive_index.py --docsdir docs

      - name: Commit all outputs to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || \
            git commit -m "chore: NHL dashboard + IG cards — ${{ steps.date.outputs.run_date }} [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      # ── Instagram PNGs also saved as downloadable Actions artifact ──
      - name: Upload Instagram cards as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagram-cards-${{ steps.date.outputs.run_date }}
          path: docs/instagram/${{ steps.date.outputs.run_date }}_*.png
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
